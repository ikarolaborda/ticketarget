name: ticketarget

# ──────────────────────────────────────────────────────────────────────────────
# Reusable fragments
# ──────────────────────────────────────────────────────────────────────────────
x-php-build: &php-build
  context: .
  dockerfile: docker/php/Dockerfile
  args:
    PHP_VERSION: ${PHP_VERSION:-8.5}

x-php-env: &php-env
  APP_ENV: ${APP_ENV:-local}
  APP_DEBUG: ${APP_DEBUG:-true}
  LOG_CHANNEL: ${LOG_CHANNEL:-kafka}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
  KAFKA_LOG_TOPIC: ${KAFKA_LOG_TOPIC:-logs.app}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_SENTINEL_MASTER: ${REDIS_SENTINEL_MASTER:-mymaster}
  REDIS_SENTINEL_HOSTS: ${REDIS_SENTINEL_HOSTS}

x-restart: &restart unless-stopped

networks:
  edge:
    driver: bridge
  backplane:
    driver: bridge

volumes:
  pg-primary-data:
  pg-replica-data:
  redis-master-data:
  redis-replica-data:
  es-data:
  kafka-data:

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Edge: Load Balancer + API Gateway
  # ────────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    restart: *restart
    command:
      # Static file-based routing only — no Docker provider/socket needed.
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true
      - --api.insecure=true
      - --accesslog=true
      - --accesslog.format=json
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-18080}:8080"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    networks: [edge]

  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — primary + streaming read-replica
  # ────────────────────────────────────────────────────────────────────────────
  postgres-primary:
    image: postgres:17
    restart: *restart
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    command:
      - postgres
      - -c
      - wal_level=logical          # required for Debezium CDC
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
      - ./infra/postgres/primary/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [backplane]

  postgres-replica:
    image: postgres:17
    restart: *restart
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PRIMARY_HOST: ${POSTGRES_PRIMARY_HOST}
      REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    volumes:
      - pg-replica-data:/var/lib/postgresql/data
      - ./infra/postgres/replica/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ticketarget}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backplane]

  # ────────────────────────────────────────────────────────────────────────────
  # Redis Sentinel HA — cache (Event) + distributed seat locks (Booking)
  # ────────────────────────────────────────────────────────────────────────────
  redis-master:
    image: redis:7-alpine
    restart: *restart
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}", "--masterauth", "${REDIS_PASSWORD}"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks: [backplane]

  redis-replica:
    image: redis:7-alpine
    restart: *restart
    depends_on: [redis-master]
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--replicaof", "redis-master", "6379", "--requirepass", "${REDIS_PASSWORD}", "--masterauth", "${REDIS_PASSWORD}"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-replica-data:/data
    networks: [backplane]

  redis-sentinel-1: &sentinel
    image: redis:7-alpine
    restart: *restart
    depends_on: [redis-master, redis-replica]
    entrypoint: ["/bin/sh", "/sentinel-entrypoint.sh"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SENTINEL_MASTER: ${REDIS_SENTINEL_MASTER:-mymaster}
      SENTINEL_QUORUM: "2"
    volumes:
      - ./infra/redis/sentinel-entrypoint.sh:/sentinel-entrypoint.sh:ro
    networks: [backplane]

  redis-sentinel-2:
    <<: *sentinel

  redis-sentinel-3:
    <<: *sentinel

  # ────────────────────────────────────────────────────────────────────────────
  # Kafka (KRaft) + Schema Registry
  # ────────────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    restart: *restart
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s
    networks: [backplane]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    restart: *restart
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks: [backplane]

  # ────────────────────────────────────────────────────────────────────────────
  # Debezium (CDC) on Kafka Connect
  # ────────────────────────────────────────────────────────────────────────────
  debezium-connect:
    image: debezium/connect:3.0.0.Final
    restart: *restart
    depends_on:
      kafka:
        condition: service_healthy
      postgres-primary:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: ticketarget-connect
      CONFIG_STORAGE_TOPIC: connect.configs
      OFFSET_STORAGE_TOPIC: connect.offsets
      STATUS_STORAGE_TOPIC: connect.status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    ports:
      - "8083:8083"
    networks: [backplane]

  # ────────────────────────────────────────────────────────────────────────────
  # Elasticsearch
  # ────────────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: *restart
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks: [backplane]

  # ────────────────────────────────────────────────────────────────────────────
  # Application services
  # ────────────────────────────────────────────────────────────────────────────
  event-service:
    build:
      <<: *php-build
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        SERVICE: services/event-service
        APP_FRAMEWORK: laravel
    restart: *restart
    depends_on:
      postgres-primary: { condition: service_healthy }
      postgres-replica: { condition: service_started }
      redis-master: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *php-env
      SERVER_ROOT: /srv/services/event-service/public
      APP_KEY: ${EVENT_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${POSTGRES_PRIMARY_HOST}
      DB_READ_HOST: ${POSTGRES_REPLICA_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    labels:
      - traefik.enable=true
      - traefik.docker.network=ticketarget_edge
      - traefik.http.routers.event.rule=Host(`api.${ROOT_DOMAIN}`) && PathPrefix(`/events`,`/event`,`/venues`)
      - traefik.http.routers.event.entrypoints=web
      - traefik.http.routers.event.middlewares=api-ratelimit@file,secure-headers@file,request-id@file
      - traefik.http.services.event.loadbalancer.server.port=8000
    networks: [edge, backplane]

  booking-service:
    build:
      <<: *php-build
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        SERVICE: services/booking-service
        APP_FRAMEWORK: laravel
    restart: *restart
    depends_on:
      postgres-primary: { condition: service_healthy }
      redis-master: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *php-env
      SERVER_ROOT: /srv/services/booking-service/public
      APP_KEY: ${BOOKING_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${POSTGRES_PRIMARY_HOST}
      DB_READ_HOST: ${POSTGRES_REPLICA_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_LOCK_DB: ${REDIS_LOCK_DB:-1}
      STRIPE_SECRET: ${STRIPE_SECRET}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    labels:
      - traefik.enable=true
      - traefik.docker.network=ticketarget_edge
      # The purchase path is gated by the waiting-room forward-auth (edge-challenge).
      - traefik.http.routers.booking-reserve.rule=Host(`api.${ROOT_DOMAIN}`) && Path(`/reserve`)
      - traefik.http.routers.booking-reserve.entrypoints=web
      - traefik.http.routers.booking-reserve.middlewares=booking-ratelimit@file,secure-headers@file,request-id@file,edge-challenge@file
      # Booking confirmation, queue join, and the Stripe webhook are not gated.
      - traefik.http.routers.booking.rule=Host(`api.${ROOT_DOMAIN}`) && (PathPrefix(`/booking`) || PathPrefix(`/queue`))
      - traefik.http.routers.booking.entrypoints=web
      - traefik.http.routers.booking.middlewares=booking-ratelimit@file,secure-headers@file,request-id@file
      - traefik.http.services.booking.loadbalancer.server.port=8000
    networks: [edge, backplane]

  # Runs the Laravel scheduler (reservation-expiry sweeper) for the Booking service.
  booking-scheduler:
    build:
      <<: *php-build
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        SERVICE: services/booking-service
        APP_FRAMEWORK: laravel
    restart: *restart
    depends_on:
      postgres-primary: { condition: service_healthy }
      redis-master: { condition: service_healthy }
    environment:
      <<: *php-env
      APP_KEY: ${BOOKING_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${POSTGRES_PRIMARY_HOST}
      DB_READ_HOST: ${POSTGRES_REPLICA_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_LOCK_DB: ${REDIS_LOCK_DB:-1}
    command: ["php", "/srv/services/booking-service/artisan", "schedule:work"]
    # CLI process — the image's HTTP healthcheck does not apply.
    healthcheck:
      disable: true
    networks: [backplane]

  search-service:
    build:
      <<: *php-build
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        SERVICE: services/search-service
        APP_FRAMEWORK: symfony
    restart: *restart
    depends_on:
      elasticsearch: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      <<: *php-env
      SERVER_ROOT: /srv/services/search-service/public
      APP_SECRET: ${APP_SECRET}
      ELASTICSEARCH_HOSTS: ${ELASTICSEARCH_HOSTS}
      ELASTICSEARCH_EVENTS_INDEX: ${ELASTICSEARCH_EVENTS_INDEX:-events}
    labels:
      - traefik.enable=true
      - traefik.docker.network=ticketarget_edge
      - traefik.http.routers.search.rule=Host(`api.${ROOT_DOMAIN}`) && PathPrefix(`/search`)
      - traefik.http.routers.search.entrypoints=web
      - traefik.http.routers.search.middlewares=api-ratelimit@file,secure-headers@file,request-id@file
      - traefik.http.services.search.loadbalancer.server.port=8000
    networks: [edge, backplane]

  worker:
    build:
      <<: *php-build
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        SERVICE: services/worker
        APP_FRAMEWORK: symfony
        APP_RUNTIME: cli
    restart: *restart
    depends_on:
      kafka: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      postgres-replica: { condition: service_started }
    environment:
      <<: *php-env
      APP_SECRET: ${APP_SECRET}
      ELASTICSEARCH_HOSTS: ${ELASTICSEARCH_HOSTS}
      ELASTICSEARCH_EVENTS_INDEX: ${ELASTICSEARCH_EVENTS_INDEX:-events}
      CDC_TOPIC_PREFIX: ${CDC_TOPIC_PREFIX:-ticketarget.cdc}
      CDC_DLQ_TOPIC: ${CDC_DLQ_TOPIC:-ticketarget.cdc.dlq}
      CDC_MAX_ATTEMPTS: ${CDC_MAX_ATTEMPTS:-3}
      # Enrichment reads hit the PRIMARY: a CDC event fires when the row lands on
      # the primary, so reading from a lagging replica could miss it and cause a
      # spurious delete from the index.
      DB_READ_DSN: "pgsql:host=${POSTGRES_PRIMARY_HOST};port=${POSTGRES_PORT};dbname=${POSTGRES_DB}"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    command: ["php", "/srv/services/worker/bin/console", "ticketarget:cdc:consume"]
    # CLI process — the image's HTTP healthcheck does not apply.
    healthcheck:
      disable: true
    networks: [backplane]

  # Ships the structured log topic into Elasticsearch for querying in Kibana.
  log-shipper:
    build:
      <<: *php-build
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        SERVICE: services/worker
        APP_FRAMEWORK: symfony
        APP_RUNTIME: cli
    restart: *restart
    depends_on:
      kafka: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    environment:
      <<: *php-env
      APP_SECRET: ${APP_SECRET}
      ELASTICSEARCH_HOSTS: ${ELASTICSEARCH_HOSTS}
      APP_LOGS_INDEX: ${APP_LOGS_INDEX:-app-logs}
    command: ["php", "/srv/services/worker/bin/console", "ticketarget:logs:ship"]
    # CLI process — the image's HTTP healthcheck does not apply.
    healthcheck:
      disable: true
    networks: [backplane]

  # ────────────────────────────────────────────────────────────────────────────
  # Observability dashboard
  # ────────────────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: *restart
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      ELASTICSEARCH_HOSTS: ${ELASTICSEARCH_HOSTS}
    labels:
      - traefik.enable=true
      - traefik.docker.network=ticketarget_edge
      - traefik.http.routers.kibana.rule=Host(`logs.${ROOT_DOMAIN}`)
      - traefik.http.routers.kibana.entrypoints=web
      - traefik.http.services.kibana.loadbalancer.server.port=5601
    networks: [edge, backplane]

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend (Vue 3 + Vite)
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: http://api.${ROOT_DOMAIN}
    restart: *restart
    labels:
      - traefik.enable=true
      - traefik.docker.network=ticketarget_edge
      - traefik.http.routers.frontend.rule=Host(`app.${ROOT_DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.services.frontend.loadbalancer.server.port=80
    networks: [edge]
