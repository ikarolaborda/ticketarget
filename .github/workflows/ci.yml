name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  laravel:
    name: Laravel (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [event-service, booking-service, users-service]
    steps:
      # services/* are submodules — without recursive checkout the job sees
      # empty directories and composer dies at install.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, pdo_sqlite, sqlite3, redis, rdkafka, intl, zip, bcmath, pcntl
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (code style)
        working-directory: services/${{ matrix.service }}
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        working-directory: services/${{ matrix.service }}
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit
        working-directory: services/${{ matrix.service }}
        run: vendor/bin/phpunit

  symfony:
    name: Symfony (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [search-service, worker]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: rdkafka, intl, zip, pdo_pgsql, ctype, iconv
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHPStan (static analysis)
        working-directory: services/${{ matrix.service }}
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit
        working-directory: services/${{ matrix.service }}
        run: vendor/bin/phpunit

  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests
        working-directory: frontend
        run: npm run test:unit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://api.ticketarget.localhost
        run: npm run build

  compose:
    name: docker compose config + image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare env
        run: cp .env.example .env

      - name: Validate compose topology
        run: docker compose config -q

      - name: Build the shared PHP image (event-service)
        run: docker compose build event-service
